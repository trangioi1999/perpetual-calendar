<div class="calendar">
  <header class="calendar__topbar">
    <div class="calendar__legend">
      @for (entry of dayTypeEntries; track entry.type) {
        <span class="calendar__legend-item">
          <span class="calendar__legend-dot calendar__legend-dot--{{ entry.cssKey }}"></span>
          {{ entry.label }}
        </span>
      }
    </div>

    <div class="calendar__controls">
      <button matButton="outlined" type="button" (click)="goToday()">Hôm nay</button>
      <button matIconButton type="button" (click)="prevMonth()" aria-label="Tháng trước">
        &#8249;
      </button>
      <button matIconButton type="button" (click)="nextMonth()" aria-label="Tháng sau">
        &#8250;
      </button>

      <div class="calendar__title-wrap">
        <button
          type="button"
          class="calendar__title-button"
          (click)="togglePicker()"
          [attr.aria-expanded]="pickerOpen()"
        >
          <span class="calendar__title-text">
            <strong>{{ title() }}</strong>
            <small>{{ yearCanChi() }}</small>
          </span>
          <span class="calendar__caret" [class.calendar__caret--open]="pickerOpen()">&#9662;</span>
        </button>

        @if (pickerOpen()) {
          <div class="calendar__picker-backdrop" (click)="closePicker()"></div>
          <div class="calendar__picker" role="dialog" aria-label="Chọn tháng">
            <div class="calendar__picker-year">
              <button matIconButton type="button" (click)="shiftPickerYear(-1)" aria-label="Năm trước">
                &#8249;
              </button>
              <strong>{{ pickerYear() }}</strong>
              <button matIconButton type="button" (click)="shiftPickerYear(1)" aria-label="Năm sau">
                &#8250;
              </button>
            </div>
            <div class="calendar__picker-months">
              @for (m of pickerMonths; track m) {
                <button
                  type="button"
                  class="calendar__picker-month"
                  [class.calendar__picker-month--active]="m === viewMonth() && pickerYear() === viewYear()"
                  (click)="selectMonth(m)"
                >
                  T{{ m }}
                </button>
              }
            </div>
          </div>
        }
      </div>
    </div>
  </header>

  <div class="calendar__grid" role="grid">
    @for (weekday of weekdays; track weekday) {
      <div class="calendar__weekday" role="columnheader">{{ weekday }}</div>
    }

    @for (cell of cells(); track cell.iso) {
      <button
        type="button"
        class="calendar__cell"
        role="gridcell"
        [class.calendar__cell--outside]="!cell.isCurrentMonth"
        [class.calendar__cell--today]="cell.isToday"
        [class.calendar__cell--readonly]="!editable()"
        [attr.aria-label]="cell.iso"
        (click)="onCellClick(cell)"
      >
        <span class="calendar__solar-day">{{ cell.solarDay }}</span>
        <span class="calendar__lunar-day">{{ cell.lunarLabel }}</span>
        <span class="calendar__cell-bottom">
          @if (cell.info; as info) {
            <span
              class="calendar__badge calendar__badge--{{ dayTypeConfig[info.dayType].cssKey }}"
              [title]="info.note || info.name || dayTypeConfig[info.dayType].label"
            >
              {{ info.name || dayTypeConfig[info.dayType].label }}
            </span>
          } @else if (editable()) {
            <span class="calendar__add" aria-hidden="true">+ Thêm</span>
          }
        </span>
      </button>
    }
  </div>
</div>
